name: check

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run lint
        run: ruff check .

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Compile project
        run: python -m compileall main.py bot services utils core config.py tests
